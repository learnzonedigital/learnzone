<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnZone — Get Your Ebook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --border: #2a2a2a;
    --accent: #2196c4;
    --text: #f0ede6;
    --text-dim: #888;
    --error: #e05c5c;
    --success: #4caf7d;
    --warning: #f0a500;
    --radius: 12px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0;
  }
  .glow {
    position: fixed; width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(33,150,196,0.07) 0%, transparent 70%);
    top: -100px; right: -100px; pointer-events: none; z-index: 0;
  }
  .card {
    position: relative; z-index: 1;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 48px; width: 100%; max-width: 480px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }
  .logo { display: flex; flex-direction: column; align-items: center; margin-bottom: 28px; }
  .logo img { width: 90px; height: 90px; object-fit: contain; border-radius: 16px; margin-bottom: 8px; }
  .logo-text { font-size: 13px; font-weight: 500; letter-spacing: 3px; text-transform: uppercase; color: var(--text-dim); }
  h1 { font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; line-height: 1.25; margin-bottom: 8px; text-align: center; }
  .subtitle { color: var(--text-dim); font-size: 14px; font-weight: 300; margin-bottom: 28px; line-height: 1.6; text-align: center; }
  .divider { width: 40px; height: 2px; background: var(--accent); margin: 0 auto 28px; border-radius: 2px; }
  .footer { margin-top: 28px; text-align: center; font-size: 12px; color: var(--text-dim); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* All reusable UI pieces */
  .field { margin-bottom: 20px; }
  .lz-label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .lz-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; color: var(--text);
    font-family: 'DM Sans', sans-serif; font-size: 15px;
    transition: border-color 0.2s, box-shadow 0.2s; outline: none;
  }
  .lz-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(33,150,196,0.12); }
  .lz-input.err { border-color: var(--error); box-shadow: 0 0 0 3px rgba(224,92,92,0.1); }
  .lz-hint { color: var(--text-dim); font-size: 12px; margin-top: 6px; }
  .lz-err-msg { display: none; color: var(--error); font-size: 12px; margin-top: 6px; }
  .lz-err-msg.show { display: block; }
  .lz-btn {
    width: 100%; padding: 15px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
    font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px;
    transition: background 0.2s, transform 0.1s;
  }
  .lz-btn:hover { background: #1a7fa8; }
  .lz-btn:active { transform: scale(0.99); }
  .lz-btn-ghost {
    width: 100%; padding: 13px; background: transparent; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; margin-top: 10px;
    transition: border-color 0.2s, color 0.2s;
  }
  .lz-btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

  /* Loading */
  .lz-loading { display: flex; flex-direction: column; align-items: center; padding: 28px 0 12px; animation: fadeIn 0.3s ease; }
  .lz-spinner { width: 44px; height: 44px; border: 3px solid rgba(33,150,196,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
  .lz-loading-title { font-size: 16px; font-weight: 500; color: var(--text); margin-bottom: 4px; text-align: center; }
  .lz-loading-sub { font-size: 13px; color: var(--text-dim); text-align: center; line-height: 1.5; }

  /* Alert boxes */
  .lz-alert { border-radius: var(--radius); padding: 20px; font-size: 14px; line-height: 1.6; animation: fadeIn 0.3s ease; margin-bottom: 16px; }
  .lz-alert .lz-alert-icon { font-size: 26px; display: block; margin-bottom: 8px; }
  .lz-alert .lz-alert-title { font-size: 15px; font-weight: 600; display: block; margin-bottom: 4px; }
  .lz-alert.success { background: rgba(76,175,125,0.1); border: 1px solid rgba(76,175,125,0.3); color: var(--success); }
  .lz-alert.fail { background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.3); color: var(--error); }
  .lz-alert.warning { background: rgba(33,150,196,0.1); border: 1px solid rgba(33,150,196,0.3); color: var(--accent); }
  .lz-alert.waiting { background: rgba(240,165,0,0.08); border: 1px solid rgba(240,165,0,0.25); color: var(--warning); text-align: center; }

  /* Countdown */
  .lz-countdown { font-size: 44px; font-weight: 700; font-family: 'Playfair Display', serif; letter-spacing: 3px; margin: 14px 0 6px; }
  .lz-countdown-sub { font-size: 12px; opacity: 0.8; }

  /* Confirm box */
  .lz-confirm-box { background: rgba(33,150,196,0.08); border: 1px solid rgba(33,150,196,0.2); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; font-size: 14px; color: var(--text-dim); }
  .lz-confirm-email { color: var(--accent); font-size: 15px; font-weight: 600; display: block; margin-bottom: 6px; word-break: break-all; }
</style>
</head>
<body>
<div class="glow"></div>
<div class="card">
  <div class="logo">
    <img src="https://learnzonedigital.github.io/learnzone/logo.png" alt="LearnZone" />
    <div class="logo-text">LearnZone</div>
  </div>
  <h1>Get Your Ebook</h1>
  <p class="subtitle">Enter your Shopee Order ID to get started.</p>
  <div class="divider"></div>
  <div id="app"></div>
  <div class="footer">Problem with your order? Contact our <a href="https://shopee.com.my/learnzone" target="_blank" style="color:var(--accent);text-decoration:underline">customer service</a> via Shopee chat.</div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzCVgc5v67MDIU15p3W3C3pmiEvxb_4MC1bfHHQSAyek9w8m7OiA2HYfznl5nBWS4g6/exec";
const CS = "Please contact our customer service via Shopee chat and we will help you right away!";

let ORDER_ID = '';
let EMAIL = '';
let cdTimer = null;
let cbCounter = 0;

// ─── render helper ───────────────────────────────
function render(html) {
  if (cdTimer) { clearInterval(cdTimer); cdTimer = null; }
  document.getElementById('app').innerHTML = html;
}

// ─── JSONP call (unique ID every time) ───────────
function api(params, done) {
  const name = '__lz' + (++cbCounter) + '_' + Date.now();
  const qs = Object.entries(params).map(([k,v]) => k+'='+encodeURIComponent(v)).join('&');
  const sid = 'lzs_' + cbCounter;

  const tid = setTimeout(() => {
    delete window[name];
    const s = document.getElementById(sid); if(s) s.remove();
    done(null);
  }, 15000);

  window[name] = r => {
    clearTimeout(tid);
    delete window[name];
    const s = document.getElementById(sid); if(s) s.remove();
    done(r);
  };

  const sc = document.createElement('script');
  sc.id = sid;
  sc.src = SCRIPT_URL + '?' + qs + '&callback=' + name;
  document.body.appendChild(sc);
}

// ─── email validator ─────────────────────────────
function validEmail(e) {
  const p = e.split('@');
  if (p.length !== 2) return false;
  const d = p[1];
  return d.includes('.') && !d.startsWith('.') && !d.endsWith('.') && p[0].length > 0;
}

// ─── error messages ──────────────────────────────
const ERRORS = {
  not_found:    { t:'fail',    i:'❌', h:'Order ID Not Found',   m:`We could not find this Order ID. Please double-check and try again.<br><br>${CS}` },
  already_sent: { t:'warning', i:'📬', h:'Already Delivered',    m:`This order has already been sent! Check your inbox and spam folder.<br><br>Still cannot find it? ${CS}` },
  cancelled:    { t:'fail',    i:'🚫', h:'Order Cancelled',       m:`This order has been cancelled. If you think this is a mistake, ${CS}` },
  book_not_found:{ t:'fail',   i:'⚠️', h:'Something Went Wrong', m:`There was an issue processing your order. ${CS}` },
  file_too_large:{ t:'fail',   i:'⚠️', h:'Something Went Wrong', m:`There was an issue processing your order. ${CS}` },
  send_failed:  { t:'fail',    i:'⚠️', h:'Something Went Wrong', m:`There was an issue sending your ebook. ${CS}` },
  server_error: { t:'fail',    i:'⚠️', h:'Something Went Wrong', m:`An unexpected error occurred. ${CS}` },
  _timeout:     { t:'fail',    i:'⏱️', h:'Request Timed Out',    m:`Please try again. ${CS}` },
  _default:     { t:'fail',    i:'⚠️', h:'Something Went Wrong', m:`An unexpected error occurred. ${CS}` },
};

function alertBox(key, extra) {
  const e = ERRORS[key] || ERRORS._default;
  return `<div class="lz-alert ${e.t}">
    <span class="lz-alert-icon">${e.i}</span>
    <span class="lz-alert-title">${e.h}</span>
    ${e.m}${extra||''}
  </div>`;
}

// ════════════════════════════════════════════════
// STEP 1 — Order ID
// ════════════════════════════════════════════════
function stepOrderId(errorKey) {
  render(`
    ${errorKey ? alertBox(errorKey) : ''}
    <div class="field">
      <label class="lz-label">Shopee Order ID</label>
      <input class="lz-input" id="oid" placeholder="e.g. 260529N1Q25U6C" autocomplete="off" />
      <div class="lz-err-msg" id="oidErr">Please enter your Order ID.</div>
    </div>
    <button class="lz-btn" onclick="submitOrderId()">Check My Order</button>
  `);
  const inp = document.getElementById('oid');
  if (inp) { inp.focus(); inp.addEventListener('keydown', e => { if(e.key==='Enter') submitOrderId(); }); }
}

function submitOrderId() {
  const v = (document.getElementById('oid').value || '').trim().toUpperCase();
  if (!v) {
    document.getElementById('oid').classList.add('err');
    document.getElementById('oidErr').classList.add('show');
    return;
  }
  ORDER_ID = v;

  render(`
    <div class="lz-loading">
      <div class="lz-spinner"></div>
      <div class="lz-loading-title">Extracting your order...</div>
      <div class="lz-loading-sub">We are verifying your order details.<br>Please wait a moment.</div>
    </div>
  `);

  api({ orderId: ORDER_ID, checkOnly: 'true' }, r => {
    if (!r) { stepOrderId('_timeout'); return; }
    if (r.error === 'not_ready') { stepCountdown(r.secondsLeft, r.bookCount, r.readyAt); }
    else if (r.error === 'ready') { stepEmail(); }
    else { stepOrderId(r.error || '_default'); }
  });
}

// ════════════════════════════════════════════════
// STEP 2a — Countdown (6+ books)
// ════════════════════════════════════════════════
function stepCountdown(secsLeft, bookCount, readyAtMs) {
  const readyAt = new Date(readyAtMs);
  const readyAtStr = readyAt.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });

  render(`
    <div class="lz-alert waiting">
      <span class="lz-alert-icon">📦</span>
      <span class="lz-alert-title">Almost Ready!</span>
      We are verifying your order of <strong>${bookCount} books</strong> to make sure you receive everything correctly.<br><br>
      Please come back at <strong>${readyAtStr}</strong> to claim your ebook.
      <div class="lz-countdown" id="cdTimer">--:--</div>
      <div class="lz-countdown-sub">Ready at ${readyAtStr}</div>
    </div>
  `);

  function tick() {
    const diff = Math.max(0, Math.ceil((readyAt - Date.now()) / 1000));
    const el = document.getElementById('cdTimer');
    if (el) el.textContent = String(Math.floor(diff/60)).padStart(2,'0') + ':' + String(diff%60).padStart(2,'0');
    if (diff <= 0) { clearInterval(cdTimer); cdTimer = null; stepEmail(); }
  }
  tick();
  cdTimer = setInterval(tick, 1000);
}

// ════════════════════════════════════════════════
// STEP 2b — Ready + Email input
// ════════════════════════════════════════════════
function stepEmail() {
  render(`
    <div class="lz-alert success" style="margin-bottom:20px">
      <span class="lz-alert-icon">✅</span>
      <span class="lz-alert-title">Your Order is Ready!</span>
      Your order has been verified. Please enter your email below to receive your ebook.
    </div>
    <div class="field">
      <label class="lz-label">Your Email Address</label>
      <input class="lz-input" id="eml" type="email" placeholder="you@example.com" autocomplete="off" />
      <div class="lz-err-msg" id="emlErr">Please enter a valid email (e.g. you@gmail.com).</div>
      <p class="lz-hint">Your ebook will be sent to this address.</p>
    </div>
    <button class="lz-btn" onclick="submitEmail()">Continue</button>
  `);
  const inp = document.getElementById('eml');
  if (inp) { inp.focus(); inp.addEventListener('keydown', e => { if(e.key==='Enter') submitEmail(); }); }
}

function submitEmail() {
  const v = (document.getElementById('eml').value || '').trim();
  if (!v || !validEmail(v)) {
    document.getElementById('eml').classList.add('err');
    document.getElementById('emlErr').classList.add('show');
    return;
  }
  EMAIL = v;
  stepConfirm();
}

// ════════════════════════════════════════════════
// STEP 3 — Confirm email
// ════════════════════════════════════════════════
function stepConfirm() {
  render(`
    <div class="lz-confirm-box">
      <span class="lz-confirm-email">${EMAIL}</span>
      Please confirm this is your correct email. Your ebook will be sent here and
      <strong style="color:var(--error)">cannot be resent</strong> to a different address.
    </div>
    <button class="lz-btn" onclick="submitSend()">Yes, Send My Ebook</button>
    <button class="lz-btn-ghost" onclick="stepEmail()">Edit Email</button>
  `);
}

// ════════════════════════════════════════════════
// STEP 4 — Send
// ════════════════════════════════════════════════
function submitSend() {
  render(`
    <div class="lz-loading">
      <div class="lz-spinner"></div>
      <div class="lz-loading-title">Sending your ebook...</div>
      <div class="lz-loading-sub">Please wait while we prepare and deliver your ebook.<br>This may take up to 15 seconds.</div>
    </div>
  `);

  api({ orderId: ORDER_ID, email: EMAIL }, r => {
    if (!r) { render(alertBox('_timeout')); return; }
    if (r.success) {
      render(`
        <div class="lz-alert success">
          <span class="lz-alert-icon">📬</span>
          <span class="lz-alert-title">Ebook Sent!</span>
          Your ebook is on its way to <strong>${EMAIL}</strong>!<br><br>
          Check your inbox — it should arrive within a few minutes.
          Do not forget to check your <strong>spam or junk folder</strong> too!<br><br>
          Enjoy your reading!<br><br>
          ⭐ Happy with your purchase? Please take 5 seconds to leave us a
          <a href="https://shopee.com.my/learnzone" target="_blank" style="color:var(--success);font-weight:600;text-decoration:underline">5-star rating on Shopee</a>
          — it helps us grow and reach more readers like you!
        </div>
        <button class="lz-btn-ghost" style="margin-top:12px" onclick="stepOrderId()">&#8592; Have another order? Go back</button>
        
      `);
    } else {
      render(alertBox(r.error || '_default'));
    }
  });
}

// ─── Start ───────────────────────────────────────
stepOrderId();
</script>
</body>
</html>
